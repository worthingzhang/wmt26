task: dsb-deu_devsplit_fs5_v1
dataset_path: json
dataset_name: null
dataset_kwargs:
  data_files:
    test: /home/zc/wmt26/configs/eval/devsplits/sorbian_devsplit_fewshot_v1/eval/de-dsb_mt.jsonl
test_split: test
num_fewshot: 5
fewshot_config:
  sampler: first_n
  samples: !function utils.de_dsb_mt_shots
fewshot_delimiter: "\n\n"
target_delimiter: " "
doc_to_text: "Translate the following Lower Sorbian text to German. Put it in this format <deu> German translation </deu>.\n<dsb> {{dsb}} </dsb>"
doc_to_target: "{{de}}"
generation_kwargs:
  until:
    - "<|endoftext|>"
    - "შჩ"
  max_gen_toks: 256
  temperature: 1
  top_p: 1.0
  top_k: 20
  min_p: 0.0
  repetition_penalty: 1.0
filter_list:
  - name: "remove_tags"
    filter:
      - function: "strip_thinking"
      - function: "regex"
        regex_pattern: "<deu>\\s*([\\s\\S]*?)\\s*(?:</deu>|$)"
      - function: "take_first"
metric_list:
  - metric: bleu
  - metric: !function lm_eval.tasks.wmt26-lrl.utils.chrf_pp
    aggregation: chrf++
    higher_is_better: true
metadata:
  version: 1.0
