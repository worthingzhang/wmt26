# SFT smoke 训练配置
# LlamaFactory stage: sft (supervised fine-tuning)
# 数据格式: ShareGPT messages

### model
model_name_or_path: PLACEHOLDER   # 由脚本注入

### method
stage: sft
do_train: true
finetuning_type: full
# 小模型可先用 full；如显存不足可改为 lora
deepspeed: PLACEHOLDER

### dataset
dataset_dir: /home/zc/wmt26/data/processed/sft
dataset: sft_mix_v1
template: qwen
# 数据格式: sharegpt
cutoff_len: 4096
max_samples: 200000
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: PLACEHOLDER   # 由脚本注入
logging_steps: 10
save_steps: 50
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 5.0e-6
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### eval
# val_size: 0.01
# per_device_eval_batch_size: 1
# eval_strategy: steps
# eval_steps: 50

### report
callbacks: []
